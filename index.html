<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Sherlock Delivery</title>
  <style>
    :root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#f8fafc;--line:#253045;--accent:#38bdf8;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#0f172a,#020617);color:var(--text);min-height:100vh}.app{max-width:720px;margin:auto;padding:22px 16px 42px}header{display:flex;align-items:center;gap:12px;margin-bottom:18px}.logo{font-size:34px}.title h1{font-size:24px;margin:0}.title p{margin:2px 0 0;color:var(--muted)}.card{background:rgba(17,24,39,.94);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 18px 40px rgba(0,0,0,.2)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;font-size:13px;color:#cbd5e1;margin-bottom:7px}input{width:100%;padding:14px;border-radius:12px;border:1px solid #334155;background:#020617;color:white;font-size:18px;outline:none}input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,.15)}button{border:0;border-radius:14px;padding:15px 18px;font-weight:800;font-size:16px;cursor:pointer}.primary{width:100%;background:linear-gradient(90deg,#0284c7,#38bdf8);color:#001018;margin-top:14px}.secondary{background:#1e293b;color:white}.danger{background:#3f1117;color:#fecaca}.result{display:none;text-align:center}.verdict{font-size:32px;font-weight:900;margin:4px 0 14px}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{background:#020617;border:1px solid var(--line);border-radius:14px;padding:14px}.metric small{display:block;color:var(--muted);margin-bottom:6px}.metric strong{font-size:22px}.reason{margin-top:14px;color:#dbeafe;line-height:1.5}.tabs{display:flex;gap:8px;margin-bottom:14px}.tabs button{flex:1;padding:11px}.active{background:#0ea5e9;color:#001018}.history-item{border-bottom:1px solid var(--line);padding:12px 0}.history-item:last-child{border-bottom:0}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.muted{color:var(--muted);font-size:13px}.hidden{display:none}.status-green{color:var(--green)}.status-yellow{color:var(--yellow)}.status-red{color:var(--red)}@media(max-width:540px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="app">
    <header><div class="logo">🚚</div><div class="title"><h1>Sherlock Delivery</h1><p>Seu copiloto para aceitar corridas melhores.</p></div></header>
    <div class="tabs"><button id="tabCalc" class="active" onclick="showTab('calc')">Analisar</button><button id="tabHist" class="secondary" onclick="showTab('hist')">Histórico</button><button id="tabCfg" class="secondary" onclick="showTab('cfg')">Configurações</button></div>
    <section id="calc"><div class="card"><div class="grid"><div><label>Valor da corrida (¥)</label><input id="fare" type="number" inputmode="decimal" placeholder="Ex.: 850"></div><div><label>Distância total (km)</label><input id="distance" type="number" inputmode="decimal" step="0.1" placeholder="Ex.: 5.8"></div><div><label>Tempo estimado (min)</label><input id="minutes" type="number" inputmode="numeric" placeholder="Ex.: 25"></div><div><label>Espera no restaurante (min)</label><input id="wait" type="number" inputmode="numeric" value="0"></div></div><button class="primary" onclick="analyze()">🔍 ANALISAR CORRIDA</button></div>
      <div id="result" class="card result"><div id="verdict" class="verdict">—</div><div class="metrics"><div class="metric"><small>¥ por km</small><strong id="perKm">—</strong></div><div class="metric"><small>¥ por hora</small><strong id="perHour">—</strong></div><div class="metric"><small>Combustível</small><strong id="fuelCost">—</strong></div><div class="metric"><small>Lucro estimado</small><strong id="profit">—</strong></div></div><div id="reason" class="reason"></div></div></section>
    <section id="hist" class="hidden"><div class="card"><div class="row"><h2 style="margin:0">Histórico</h2><button class="danger" onclick="clearHistory()">Limpar</button></div><div id="historyList" style="margin-top:8px"></div></div></section>
    <section id="cfg" class="hidden"><div class="card"><h2 style="margin-top:0">Configurações</h2><div class="grid"><div><label>Consumo do veículo (km/L)</label><input id="consumption" type="number" step="0.1" value="14"></div><div><label>Gasolina (¥/L)</label><input id="gasPrice" type="number" value="157"></div><div><label>Mínimo aceitável (¥/km)</label><input id="minPerKm" type="number" value="130"></div><div><label>Mínimo aceitável (¥/hora)</label><input id="minPerHour" type="number" value="1300"></div><div><label>Valor mínimo da corrida (¥)</label><input id="minFare" type="number" value="320"></div><div><label>Espera máxima confortável (min)</label><input id="maxWait" type="number" value="7"></div></div><button class="primary" onclick="saveSettings()">Salvar configurações</button></div></section>
  </main>
<script>
const q=id=>document.getElementById(id),yen=n=>'¥'+Math.round(n).toLocaleString('ja-JP'),num=id=>Number(q(id).value||0);
function showTab(name){['calc','hist','cfg'].forEach(x=>q(x).classList.toggle('hidden',x!==name));[['tabCalc','calc'],['tabHist','hist'],['tabCfg','cfg']].forEach(([id,n])=>q(id).className=n===name?'active':'secondary');if(name==='hist')renderHistory()}
function getSettings(){return JSON.parse(localStorage.getItem('sherlockSettings'))||{consumption:14,gasPrice:157,minPerKm:130,minPerHour:1300,minFare:320,maxWait:7}}
function loadSettings(){const s=getSettings();Object.keys(s).forEach(k=>{if(q(k))q(k).value=s[k]})}
function saveSettings(){const s={consumption:num('consumption'),gasPrice:num('gasPrice'),minPerKm:num('minPerKm'),minPerHour:num('minPerHour'),minFare:num('minFare'),maxWait:num('maxWait')};localStorage.setItem('sherlockSettings',JSON.stringify(s));alert('Configurações salvas.')}
function analyze(){const fare=num('fare'),distance=num('distance'),minutes=num('minutes'),wait=num('wait');if(fare<=0||distance<=0||minutes<=0){alert('Preencha valor, distância e tempo.');return}const s=getSettings(),totalMinutes=minutes+wait,fuel=(distance/s.consumption)*s.gasPrice,profit=fare-fuel,perKm=fare/distance,perHour=(profit/totalMinutes)*60;let verdict='ACEITAR',cls='status-green',reasons=[];if(fare<s.minFare||perKm<s.minPerKm*.8||perHour<s.minPerHour*.8){verdict='RECUSAR';cls='status-red'}else if(perKm<s.minPerKm||perHour<s.minPerHour||wait>s.maxWait){verdict='PENSAR';cls='status-yellow'}if(fare<s.minFare)reasons.push('valor abaixo do mínimo');if(perKm<s.minPerKm)reasons.push('rendimento por km baixo');if(perHour<s.minPerHour)reasons.push('rendimento por hora baixo');if(wait>s.maxWait)reasons.push('espera elevada');if(!reasons.length)reasons.push('boa relação entre valor, distância e tempo');q('verdict').textContent=verdict;q('verdict').className='verdict '+cls;q('perKm').textContent=yen(perKm);q('perHour').textContent=yen(perHour);q('fuelCost').textContent=yen(fuel);q('profit').textContent=yen(profit);q('reason').textContent='Motivo: '+reasons.join(', ')+'.';q('result').style.display='block';const history=JSON.parse(localStorage.getItem('sherlockHistory')||'[]');history.unshift({date:new Date().toLocaleString('pt-BR'),fare,distance,totalMinutes,profit,perKm,perHour,verdict});localStorage.setItem('sherlockHistory',JSON.stringify(history.slice(0,100)))}
function renderHistory(){const data=JSON.parse(localStorage.getItem('sherlockHistory')||'[]');q('historyList').innerHTML=data.length?data.map(x=>`<div class="history-item"><div class="row"><strong class="${x.verdict==='ACEITAR'?'status-green':x.verdict==='PENSAR'?'status-yellow':'status-red'}">${x.verdict}</strong><span>${yen(x.fare)}</span></div><div class="muted">${x.date} · ${x.distance} km · ${x.totalMinutes} min · lucro ${yen(x.profit)}</div></div>`).join(''):'<p class="muted">Nenhuma corrida analisada ainda.</p>'}
function clearHistory(){if(confirm('Apagar todo o histórico?')){localStorage.removeItem('sherlockHistory');renderHistory()}}
loadSettings();
</script>
</body>
</html>
